<!DOCTYPE html>
<html>
<body>

<h2>AI OS Test</h2>

<input id="input" placeholder="Nhập gì đó...">
<button onclick="run()">Chạy</button>

<p id="out"></p>

<script>
async function run() {
  let v = document.getElementById("input").value;

  let res = await fetch("/api/run", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt: v })
  });

  let data = await res.json();

  document.getElementById("out").innerText = data.result;
}
</script>

</body>
</html>
